name: End-to-End Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  live-surface:
    name: test:live-surface
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Verify production surfaces fail closed
        run: npm run test:live-surface

  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      E2E_RATE_LIMIT_BYPASS_TOKEN: subscript-ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Start isolated Supabase stack
        run: supabase start

      - name: Export isolated test environment
        shell: bash
        run: |
          supabase status -o env > .supabase-local.env
          set -a
          source .supabase-local.env
          set +a
          {
            echo "DATABASE_URL=$DB_URL"
            echo "DIRECT_URL=$DB_URL"
            echo "SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "JWT_SECRET=mock_jwt_secret_for_testing_32_characters"
          } >> "$GITHUB_ENV"

      - name: Build Next.js app
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          ADOPT_EXISTING_DB_BASELINE: 1
        run: npm run build

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_TEST_TIMEOUT: 120000
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx playwright test --workers=1 --timeout=120000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          retention-days: 30
